# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, it must be a valid Python datetime.timezone() object.
# timezone =

# max length of characters to apply to the
# migration file template
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# If left empty, public names, not filenames, are used. The default value of None
# results in timestamps being used.
revision_environment = false

# set to 'true' to run the environment file as a script.
# script_location = alembic

# template used to generate revision files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
# prepend_sys_path = .

# timezone to use when rendering the date
# within the template (%%Y-%%m-%%d %%H:%%M:%%S)
# default_timezone = utc

# max length of characters to apply to the
# migration file template
# (default: 40, min: 10)
# truncate_slug_length = 40

# set to 'true' to run the environment file as a script.
# script_environment = false

# default: 'revision_environment.conservative'
# revision_environment = false

# default: false
# sourceless = false

# default: 'true'
# version_locations = %(here)s

sqlalchemy.url = sqlite:///./accounting.db

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts. See the documentation for further
# detail and examples

# format using "black" - use the console_scripts runner, against the script
# location.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S